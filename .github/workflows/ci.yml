name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  FEATURES: "desktop ai plugin plugin-lua config-watch"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Format check — fast, runs first to fail early
  # ─────────────────────────────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ─────────────────────────────────────────────────────────────────────
  # Lint — clippy with all features
  # ─────────────────────────────────────────────────────────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux GPU deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libegl1-mesa-dev
      - name: Clippy (default features)
        run: cargo clippy --workspace -- -D warnings
      - name: Clippy (full features)
        run: cargo clippy --workspace --features "${{ env.FEATURES }}" -- -D warnings

  # ─────────────────────────────────────────────────────────────────────
  # Test — stable on Linux + macOS
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux GPU deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libegl1-mesa-dev
      - name: Test (default features)
        run: cargo test --workspace
      - name: Test (full features)
        run: cargo test --workspace --features "${{ env.FEATURES }}${{ runner.os == 'macOS' && ' macos' || '' }}"

  # ─────────────────────────────────────────────────────────────────────
  # FFI tests — verify mobile FFI bridge compiles and tests pass
  # ─────────────────────────────────────────────────────────────────────
  ffi-test:
    name: ffi test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test FFI (with SSH)
        run: cargo test -p ggterm-ffi --features ssh --lib

  # ─────────────────────────────────────────────────────────────────────
  # Release build — verify clean release compilation on all platforms
  # ─────────────────────────────────────────────────────────────────────
  build-release:
    name: build release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux GPU deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libegl1-mesa-dev
      - name: Build release
        run: cargo build --release --features "${{ env.FEATURES }}${{ runner.os == 'macOS' && ' macos' || '' }}" --target ${{ matrix.target }}

  # ─────────────────────────────────────────────────────────────────────
  # Flutter analyze — check mobile Dart code
  # ─────────────────────────────────────────────────────────────────────
  flutter-analyze:
    name: flutter analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Analyze
        working-directory: mobile
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos

  # ─────────────────────────────────────────────────────────────────────
  # Coverage — non-blocking code coverage report
  # ─────────────────────────────────────────────────────────────────────
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux GPU deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate coverage
        run: cargo tarpaulin --workspace --features "${{ env.FEATURES }}" --out xml --skip-clean
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false
