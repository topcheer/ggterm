name: Release (Desktop)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      package_version:
        description: "Version label for manual packaging runs"
        required: false
        default: "v0.0.0"

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FEATURES: "desktop ai plugin plugin-lua config-watch"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Verify — run tests before releasing
  # ─────────────────────────────────────────────────────────────────────
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux GPU deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libegl1-mesa-dev
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --features "${{ env.FEATURES }}" -- -D warnings
      - name: Test
        run: cargo test --workspace --features "${{ env.FEATURES }}" --lib

  # ─────────────────────────────────────────────────────────────────────
  # macOS — universal .app bundle + .dmg
  # ─────────────────────────────────────────────────────────────────────
  macos:
    name: Build macOS
    runs-on: macos-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build (Apple Silicon)
        run: cargo build --release --features "${{ env.FEATURES }}" --target aarch64-apple-darwin
      - name: Build (Intel)
        run: cargo build --release --features "${{ env.FEATURES }}" --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/ggterm \
            target/x86_64-apple-darwin/release/ggterm \
            -output target/release/ggterm-universal
          file target/release/ggterm-universal

      - name: Build .app bundle
        run: |
          VERSION="${{ github.ref_name }}"
          if [ "$VERSION" = "" ] || [ "$VERSION" = "refs/heads/main" ]; then
            VERSION="${{ inputs.package_version }}"
          fi
          chmod +x scripts/release/build-macos-app.sh
          scripts/release/build-macos-app.sh "$VERSION"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/*.dmg
          if-no-files-found: warn

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in dist/*.dmg; do
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done

  # ─────────────────────────────────────────────────────────────────────
  # Linux — .deb + AppImage
  # ─────────────────────────────────────────────────────────────────────
  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux GPU deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-dri3-dev \
            libegl1-mesa-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binary
        run: cargo build --release --features "${{ env.FEATURES }}"

      - name: Build .deb package
        run: cargo deb --features "${{ env.FEATURES }}" -p ggterm-app --no-build

      - name: Package binary tarball
        run: |
          mkdir -p dist
          tar -czf dist/ggterm-linux-x86_64.tar.gz \
            -C target/release ggterm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            target/debian/*.deb
            dist/*.tar.gz

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in target/debian/*.deb dist/*.tar.gz; do
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done

  # ─────────────────────────────────────────────────────────────────────
  # Windows — .zip
  # ─────────────────────────────────────────────────────────────────────
  windows:
    name: Build Windows
    runs-on: windows-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --features "${{ env.FEATURES }}"

      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive \
            -Path target/release/ggterm.exe \
            -DestinationPath dist/ggterm-windows-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/*.zip

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem dist/*.zip | ForEach-Object {
            gh release upload $env:GITHUB_REF_NAME $_.FullName --clobber
          }
