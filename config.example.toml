# GGTerm Configuration Example
# Place at ~/.ggterm/config.toml
# All fields are optional — missing keys use built-in defaults.

[appearance]
# Theme: dark, light, dracula, solarized-dark, solarized-light, gruvbox,
#         nord, tokyo-night, catppuccin-mocha, auto (follows OS dark/light)
theme = "dark"

# Font family name (resolved by glyphon text shaping)
font_family = "monospace"

# Font size in pixels
font_size = 14

# Cell dimensions in pixels
cell_width = 8
cell_height = 16

# Default cursor style: "block", "underline", or "bar"
cursor_style = "block"

# Background opacity: 0.0 (fully transparent) to 1.0 (fully opaque).
# Values below 1.0 let the desktop show through the terminal window.
# Adjust at runtime: Ctrl+Shift+Alt+[ (less opaque) / ] (more opaque)
# background_opacity = 1.0

# Terminal content padding in pixels (all four sides).
# Default: 8. Set to 0 for edge-to-edge text, or larger for more breathing room.
# padding = 8

# Whether the cursor blinks. Set to false for a steady cursor.
# Default: true (blinks when window is focused)
# cursor_blink = true

# Highlight the entire line where the cursor is positioned.
# Similar to Vim's `cursorline`. Default: false.
# cursor_line_highlight = false

[terminal]
# Maximum scrollback history lines
scrollback_lines = 10000

# Shell program path. Empty = use $SHELL or /bin/sh
shell = ""

# Restore previous session (tabs, splits, pane layout) on startup.
# false = always start with a clean single-pane window (default)
# true  = restore the layout from your last session
restore_session = false

# Bell behavior when terminal sends BEL (0x07).
# "visual" = flash the terminal briefly (default)
# "sound"  = play a system sound
# "none"   = silently ignore
# bell_mode = "visual"

# Copy-on-select: automatically copy text to clipboard when you release
# the mouse button after dragging to select.
# Default: true (xterm/iTerm2 behavior)
# copy_on_select = false

# Desktop notification when a long-running command finishes while the
# window is unfocused. Uses OSC 133 shell integration to detect command
# boundaries.
# Default: true
# notify_on_complete = false

# Minimum command duration (in seconds) to trigger a completion notification.
# Commands shorter than this are silently ignored.
# Default: 10
# min_notify_duration_secs = 5

[ai]
# Enable AI features at startup.
# Also requires api_key (below) or GGTERM_AI_API_KEY env var.
# Default: false
enabled = false

# API key for authentication.
# Can also be set via GGTERM_AI_API_KEY or OPENAI_API_KEY env var.
# Get a key at: https://open.bigmodel.cn/ (GLM) or https://platform.openai.com/
# api_key = "your-api-key-here"

# LLM API endpoint URL.
# Default: GLM (智谱清言) — free tier available
# Also supports: "https://api.openai.com/v1", "https://api.deepseek.com/v1"
# Or any OpenAI-compatible endpoint.
api_endpoint = "https://open.bigmodel.cn/api/paas/v4"

# Model identifier.
# GLM: "glm-4-flash" (free), "glm-4" (paid)
# OpenAI: "gpt-4o-mini", "gpt-4o"
# DeepSeek: "deepseek-chat"
model = "glm-4-flash"

# Enable AI tool calling (default: true).
# When enabled, AI can execute commands (run_command, read_file, list_files)
# to gather context before responding.
# Disable if you prefer pure text-only AI responses.
# enable_tools = true

# ──────────────────────────────────────────────────────────────────────
# Keyboard Shortcuts (P14-D)
# ──────────────────────────────────────────────────────────────────────
# All keys are optional. Omit a key to use the built-in default.
#
# Format: "Modifier+Modifier+Key"
#   Modifiers: Ctrl, Shift, Alt  (case-insensitive, order doesn't matter)
#   Key: Single letter (A-Z), digit (0-9), punctuation (=, -), or F-key (F1-F24)
#
# Examples:
#   "Ctrl+T"           → Ctrl + T
#   "Ctrl+Shift+V"     → Ctrl + Shift + V
# Keybindings are validated on load. If two actions share the
# same key combination, GGTerm will show an error toast and a
# "!ERROR!" indicator in the status bar with details.
#
# Format:
#   "Ctrl+Shift+X"    → Ctrl + Shift + X
#   "Alt+1"           → Alt + 1
#   "F11"             → F11 (no modifiers)
#   "Ctrl+="          → Ctrl + =
# Key names are case-insensitive (Ctrl+A == Ctrl+a).

[keybindings]
# Tab management
new_tab = "Ctrl+T"
close_tab = "Ctrl+W"

# Clipboard
paste = "Ctrl+Shift+V"
copy = "Ctrl+Shift+C"

# Search
search = "Ctrl+Shift+F"

# Font zoom
zoom_in = "Ctrl+="
zoom_out = "Ctrl+-"
zoom_reset = "Ctrl+0"

# Window
fullscreen = "F11"

# Terminal actions
clear = "Ctrl+Shift+K"
reset = "Ctrl+Shift+R"

# Copy current working directory to clipboard
# (Ctrl+Shift+P without Alt is reserved for command palette)
copy_cwd = "Ctrl+Shift+Alt+P"

# Theme cycling
cycle_theme = "Ctrl+Shift+T"

# ──────────────────────────────────────────────────────────────────────
# Non-configurable shortcuts (always available)
# ──────────────────────────────────────────────────────────────────────
# Ctrl+Shift+O      → Open config file in system editor (creates if missing)
# Ctrl+Shift+Space  → Toggle scrollback browse mode (j/k/G/g/d/u/b/Space/q/Esc)
#                     In browse mode, keys navigate scrollback instead of
#                     being sent to the shell. Press q or Esc to exit.
# Ctrl+Shift+P      → Command palette (fuzzy search all actions)
# Ctrl+Shift+/      → Keyboard shortcut help overlay
# Ctrl+Shift+,      → Open config file (alternative to Ctrl+Shift+O)

# ──────────────────────────────────────────────────────────────────────
# Profiles (P22-C)
# ──────────────────────────────────────────────────────────────────────
# Named profiles allow switching between appearance/terminal presets
# at runtime via Ctrl+Shift+Alt+P or the command palette.
# Each profile can override any combination of the fields below.
# Fields not specified inherit the global defaults.
#
# [profiles.large]
# font_size = 18
#
# [profiles.minimal]
# scrollback_lines = 1000
# theme = "light"
#
# [profiles.code]
# font_size = 13
# theme = "solarized-dark"
# scrollback_lines = 50000

# ──────────────────────────────────────────────────────────────────────
# Plugins (P23-D)
# ──────────────────────────────────────────────────────────────────────
# Lua plugin system. Plugins are loaded from the directory below.
# Plugin scripts can hook into terminal events and extend functionality.
#
# [plugins]
# enabled = false
# directory = "~/.ggterm/plugins"
