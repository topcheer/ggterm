# GGTerm Configuration Example
# Place at ~/.ggterm/config.toml
# All fields are optional — missing keys use built-in defaults.

[appearance]
# Theme: "dark", "light", "dracula", "solarized-dark", "solarized-light", "gruvbox"
theme = "dark"

# Font family name (resolved by glyphon text shaping)
font_family = "monospace"

# Font size in pixels
font_size = 14

# Cell dimensions in pixels
cell_width = 8
cell_height = 16

[terminal]
# Maximum scrollback history lines
scrollback_lines = 10000

# Shell program path. Empty = use $SHELL or /bin/sh
shell = ""

# Restore previous session (tabs, splits, pane layout) on startup.
# false = always start with a clean single-pane window (default)
# true  = restore the layout from your last session
restore_session = false

[ai]
# Enable AI features at startup
enabled = false

# LLM API endpoint URL
api_endpoint = "https://api.openai.com/v1"

# Model identifier
model = "gpt-4o-mini"

# ──────────────────────────────────────────────────────────────────────
# Keyboard Shortcuts (P14-D)
# ──────────────────────────────────────────────────────────────────────
# All keys are optional. Omit a key to use the built-in default.
#
# Format: "Modifier+Modifier+Key"
#   Modifiers: Ctrl, Shift, Alt  (case-insensitive, order doesn't matter)
#   Key: Single letter (A-Z), digit (0-9), punctuation (=, -), or F-key (F1-F24)
#
# Examples:
#   "Ctrl+T"           → Ctrl + T
#   "Ctrl+Shift+V"     → Ctrl + Shift + V
#   "Alt+1"            → Alt + 1
#   "F11"              → F11 (no modifiers)
#   "Ctrl+="           → Ctrl + =

[keybindings]
# Tab management
new_tab = "Ctrl+T"
close_tab = "Ctrl+W"

# Clipboard
paste = "Ctrl+Shift+V"
copy = "Ctrl+Shift+C"

# Search
search = "Ctrl+Shift+F"

# Font zoom
zoom_in = "Ctrl+="
zoom_out = "Ctrl+-"
zoom_reset = "Ctrl+0"

# Window
fullscreen = "F11"

# Terminal actions
clear = "Ctrl+Shift+K"
reset = "Ctrl+Shift+R"

# Theme cycling
cycle_theme = "Ctrl+Shift+T"
